<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>校准 · Calibration</title>
  <meta name="description" content="给预测系统装一个置信度刻度" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Sans+SC:wght@300;400;500&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ========================================================
       Design tokens
       想换配色 / 字体？只改 :root 里这几行就行，全局会跟着变。
       ======================================================== */
    :root {
      --bg: #F1ECE0;
      --surface: #FBF7EE;
      --surface-soft: #F6F1E3;
      --border: #D9CFB9;
      --border-soft: #E5DCC7;
      --ink: #2B2620;
      --ink-soft: #6F6353;
      --ink-faint: #A19684;
      --signal: #B05A2E;
      --signal-soft: #EBD3BE;
      --noise: #566971;
      --noise-soft: #D5DDDF;
      --sage: #6F7E55;
      --sage-soft: #D8DDC4;
      --rose: #A85F6A;
      --rose-soft: #E5CDD0;

      --serif: "Noto Serif SC", "Cormorant Garamond", "Songti SC", "Source Han Serif", serif;
      --sans: "Noto Sans SC", "PingFang SC", "Hiragino Sans GB", system-ui, sans-serif;
    }

    /* reset */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.6;
    }
    button { font-family: inherit; cursor: pointer; }
    input, textarea, select { font-family: inherit; color: inherit; }
    input:focus, textarea:focus, select:focus { outline: none; }

    /* layout */
    .page {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    /* header */
    .head { text-align: center; margin-bottom: 36px; }
    .head .eyebrow {
      font-family: var(--serif);
      font-size: 11px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 10px;
    }
    .head .title {
      font-family: var(--serif);
      font-size: 38px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--ink);
    }
    .head .subtitle {
      font-family: var(--serif);
      font-size: 13px;
      font-style: italic;
      color: var(--ink-soft);
      margin-top: 12px;
      letter-spacing: 0.02em;
    }

    /* tabs */
    .tabs {
      display: flex;
      gap: 6px;
      border-bottom: 1px solid var(--border-soft);
      margin-bottom: 36px;
      overflow-x: auto;
    }
    .tab {
      padding: 10px 18px 14px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--ink-soft);
      font-family: var(--serif);
      font-size: 17px;
      letter-spacing: 0.04em;
      transition: all 0.15s ease;
      margin-bottom: -1px;
      white-space: nowrap;
      text-align: center;
    }
    .tab.active {
      border-bottom-color: var(--ink);
      color: var(--ink);
    }
    .tab small {
      display: block;
      margin-top: 2px;
      font-family: var(--sans);
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-faint);
    }

    /* primitives */
    .card {
      background: var(--surface);
      border: 1px solid var(--border-soft);
      border-radius: 4px;
      padding: 28px;
      box-shadow: 0 1px 0 rgba(43, 38, 32, 0.02);
    }
    .strip {
      background: var(--surface-soft);
      border: 1px solid var(--border-soft);
      border-radius: 3px;
      padding: 14px 22px;
      font-size: 13px;
      color: var(--ink-soft);
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    .section-label {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 14px;
    }
    .empty {
      padding: 32px 0;
      text-align: center;
      color: var(--ink-faint);
      font-size: 13px;
      font-style: italic;
      letter-spacing: 0.04em;
    }

    .h-serif {
      font-family: var(--serif);
      color: var(--ink);
      letter-spacing: 0.02em;
    }
    .h-serif.lg { font-size: 22px; margin-bottom: 6px; }
    .h-serif.md { font-size: 20px; margin-bottom: 6px; }
    .help {
      font-size: 13px;
      color: var(--ink-soft);
      margin-bottom: 18px;
      line-height: 1.7;
    }

    /* form controls */
    input[type="text"], input[type="time"], input[type="number"], textarea, select {
      width: 100%;
      padding: 8px 12px;
      background: var(--surface-soft);
      border: 1px solid var(--border-soft);
      border-radius: 3px;
      font-size: 14px;
      color: var(--ink);
      transition: border-color 0.15s ease;
    }
    textarea {
      padding: 10px 14px;
      line-height: 1.7;
      resize: vertical;
      min-height: 64px;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--ink); }

    /* buttons */
    .btn {
      padding: 7px 16px;
      border-radius: 3px;
      font-size: 13px;
      letter-spacing: 0.04em;
      transition: opacity 0.15s ease;
      border: 1px solid transparent;
      background: transparent;
      color: var(--ink-soft);
    }
    .btn:hover { opacity: 0.78; }
    .btn-soft   { background: var(--surface-soft); color: var(--ink); border-color: var(--border-soft); }
    .btn-ink    { background: var(--ink); color: var(--surface); border-color: var(--ink); }
    .btn-signal { background: var(--signal-soft); color: var(--signal); border-color: rgba(176,90,46,0.25); }
    .btn-noise  { background: var(--noise-soft);  color: var(--noise);  border-color: rgba(86,105,113,0.25); }

    .icon-btn {
      width: 26px; height: 26px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      color: var(--ink-faint);
      border: none;
      border-radius: 3px;
      transition: all 0.15s ease;
    }
    .icon-btn:hover { color: var(--ink); background: var(--surface-soft); }
    .icon-btn svg { width: 14px; height: 14px; }

    /* tag */
    .tag {
      display: inline-flex;
      align-items: center;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 11px;
      letter-spacing: 0.06em;
    }
    .tag.small { padding: 1px 8px; font-size: 10px; }
    .tag-signal { background: var(--signal-soft); color: var(--signal); border: 1px solid rgba(176,90,46,0.3); }
    .tag-noise  { background: var(--noise-soft);  color: var(--noise);  border: 1px solid rgba(86,105,113,0.3); }
    .tag-rose   { background: var(--rose-soft);   color: var(--rose);   border: 1px solid rgba(168,95,106,0.3); }

    /* lists */
    .stack { display: flex; flex-direction: column; gap: 12px; }
    .stack.lg { gap: 28px; }
    .stack.sm { gap: 10px; }

    .item {
      background: var(--surface);
      border: 1px solid var(--border-soft);
      border-radius: 3px;
      padding: 14px 18px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .item.signal { border-left: 3px solid var(--signal); }
    .item.noise  { border-left: 3px solid var(--noise); }
    .item.rose   { border-left: 3px solid var(--rose); }

    .item-text {
      font-size: 14px;
      color: var(--ink);
      line-height: 1.7;
      margin-bottom: 8px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .item-meta {
      display: flex;
      gap: 10px;
      align-items: center;
      font-size: 11px;
      color: var(--ink-faint);
      letter-spacing: 0.04em;
      flex-wrap: wrap;
    }

    .row {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    em { font-style: italic; color: inherit; }

    /* TREE */
    .tree-node {
      margin-bottom: 2px;
    }
    .tree-row {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 0;
    }
    .tree-row.depth-0 {
      background: var(--surface-soft);
      border: 1px solid var(--border-soft);
      border-radius: 3px;
    }
    .tree-row.depth-deep {
      border-left: 1px dashed var(--border);
    }
    .tree-children { margin-left: 22px; }

    .checkbox {
      width: 18px; height: 18px;
      margin-top: 4px;
      border: 1.5px solid var(--border);
      background: transparent;
      border-radius: 3px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
    }
    .checkbox.done {
      background: var(--sage);
      border-color: var(--sage);
    }
    .checkbox.done svg { color: var(--surface); }

    .node-title {
      cursor: text;
      line-height: 1.6;
    }
    .node-title.depth-0 { font-family: var(--serif); font-size: 16px; letter-spacing: 0.02em; }
    .node-title.deep   { font-family: var(--sans);  font-size: 14px; }
    .node-title.done   { color: var(--ink-faint); text-decoration: line-through; }

    .node-tags {
      display: flex; gap: 8px; margin-top: 4px; align-items: center; flex-wrap: wrap;
    }

    .node-actions {
      display: flex; gap: 0; flex-shrink: 0;
    }

    .edit-form {
      display: flex; flex-direction: column; gap: 8px; flex: 1;
    }
    .edit-controls {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }

    /* details */
    details {
      background: var(--surface-soft);
      border: 1px solid var(--border-soft);
      border-radius: 3px;
      padding: 10px 16px;
    }
    details summary {
      cursor: pointer;
      list-style: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    details summary::-webkit-details-marker { display: none; }
    details[open] .summary-content {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border-soft);
    }

    /* stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border-soft);
      border-radius: 3px;
      padding: 18px 20px;
    }
    .stat-card.ink    { border-top: 3px solid var(--ink); }
    .stat-card.signal { border-top: 3px solid var(--signal); }
    .stat-card.noise  { border-top: 3px solid var(--noise); }
    .stat-label {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 6px;
    }
    .stat-value {
      font-family: var(--serif);
      font-size: 32px;
      letter-spacing: 0.02em;
    }
    .stat-value.ink    { color: var(--ink); }
    .stat-value.signal { color: var(--signal); }
    .stat-value.noise  { color: var(--noise); }

    /* charts */
    .chart-hour {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 140px;
      margin-top: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border-soft);
    }
    .chart-hour-bar {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      height: 100%;
    }
    .chart-hour-axis {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 10px;
      color: var(--ink-faint);
      letter-spacing: 0.06em;
    }
    .chart-dow {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      height: 140px;
      margin-top: 12px;
    }
    .chart-dow-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .chart-dow-bar {
      width: 100%;
      height: 120px;
      background: var(--surface-soft);
      border: 1px solid var(--border-soft);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    .seg-signal { background: var(--signal); opacity: 0.9; }
    .seg-noise  { background: var(--noise); opacity: 0.85; }
    .dow-label  { font-size: 11px; color: var(--ink-soft); margin-top: 6px; letter-spacing: 0.04em; }
    .dow-count  { font-size: 10px; color: var(--ink-faint); }

    .pattern-note {
      padding: 18px;
      background: var(--surface-soft);
      border: 1px dashed var(--border);
      border-radius: 3px;
      font-size: 13px;
      color: var(--ink-soft);
      line-height: 1.8;
    }

    /* footer */
    .foot {
      margin-top: 60px;
      padding-top: 24px;
      border-top: 1px solid var(--border-soft);
      text-align: center;
      font-family: var(--serif);
      font-style: italic;
      font-size: 12px;
      color: var(--ink-faint);
      letter-spacing: 0.06em;
      line-height: 1.8;
    }

    /* ========================================================
       AUTH & SYNC UI
       ======================================================== */
    .auth-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }
    .auth-card {
      max-width: 420px;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border-soft);
      border-radius: 4px;
      padding: 40px 32px;
      text-align: center;
    }
    .auth-card .eyebrow {
      font-family: var(--serif);
      font-size: 11px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 10px;
    }
    .auth-card .title {
      font-family: var(--serif);
      font-size: 32px;
      letter-spacing: 0.08em;
      font-weight: 500;
      margin-bottom: 12px;
    }
    .auth-card .desc {
      font-size: 13px;
      color: var(--ink-soft);
      line-height: 1.8;
      margin-bottom: 28px;
      font-style: italic;
      font-family: var(--serif);
    }
    .auth-card input[type="email"] {
      text-align: center;
      padding: 12px 14px;
      margin-bottom: 14px;
    }
    .auth-card .btn-ink {
      width: 100%;
      padding: 12px;
      font-size: 14px;
    }
    .auth-msg {
      margin-top: 16px;
      font-size: 13px;
      line-height: 1.7;
      padding: 12px 16px;
      border-radius: 3px;
    }
    .auth-msg.info  { background: var(--surface-soft); color: var(--ink-soft); border: 1px solid var(--border-soft); }
    .auth-msg.error { background: var(--rose-soft); color: var(--rose); border: 1px solid rgba(168,95,106,0.3); }
    .auth-msg.success { background: var(--sage-soft); color: var(--sage); border: 1px solid rgba(111,126,85,0.3); }

    .auth-config-warning {
      max-width: 560px;
      margin: 80px auto;
      padding: 32px;
      background: var(--surface);
      border: 1px solid var(--border-soft);
      border-left: 3px solid var(--rose);
      border-radius: 3px;
    }
    .auth-config-warning h3 { font-family: var(--serif); font-size: 20px; margin-bottom: 12px; }
    .auth-config-warning code {
      background: var(--surface-soft);
      padding: 2px 6px;
      border-radius: 2px;
      font-size: 12px;
    }
    .auth-config-warning p { color: var(--ink-soft); margin-bottom: 12px; line-height: 1.7; }

    .user-strip {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      padding: 10px 16px;
      background: var(--surface);
      border: 1px solid var(--border-soft);
      border-radius: 3px;
      font-size: 12px;
      color: var(--ink-soft);
    }
    .sync-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      letter-spacing: 0.04em;
    }
    .sync-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--sage);
    }
    .sync-dot.syncing { background: var(--signal); animation: pulse 1.4s ease-in-out infinite; }
    .sync-dot.error   { background: var(--rose); }
    .sync-dot.offline { background: var(--ink-faint); }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* mobile */
    @media (max-width: 600px) {
      .page { padding: 32px 16px 80px; }
      .head .title { font-size: 30px; }
      .stats-grid { grid-template-columns: 1fr; }
      .card { padding: 22px; }
    }
  </style>
</head>

<body>
  <!-- AUTH OVERLAY (默认显示；登录后隐藏) -->
  <div id="auth-overlay" class="auth-overlay" style="display:none;">
    <div class="auth-card">
      <div class="eyebrow">Calibration · 卷卷的</div>
      <div class="title">校 准</div>
      <div class="desc">输入邮箱，我们发一封登录链接给你。<br/>不需要密码。</div>
      <form id="auth-form">
        <input type="email" id="auth-email" placeholder="your@email.com" required autocomplete="email" />
        <button type="submit" class="btn btn-ink" id="auth-submit">发送登录链接</button>
      </form>
      <div id="auth-message"></div>
    </div>
  </div>

  <!-- CONFIG WARNING (没填 Supabase 时显示) -->
  <div id="config-warning" style="display:none;">
    <div class="auth-config-warning">
      <h3>还没配置云端</h3>
      <p>这个版本需要 Supabase 来做跨设备同步。请先按 <code>SETUP.md</code> 里的步骤配置。</p>
      <p>具体是把 <code>index.html</code> 文件最上面的两个变量填好：</p>
      <p><code>SUPABASE_URL</code> 和 <code>SUPABASE_ANON_KEY</code></p>
      <p style="margin-top:20px;">或者你可以先用 <a href="#" onclick="enableLocalMode()">仅本地模式</a> 试试（数据只存这台设备的浏览器，不跨设备）。</p>
    </div>
  </div>

  <div class="page" id="main-page" style="display:none;">
    <!-- USER STRIP (登录后显示) -->
    <div class="user-strip" id="user-strip" style="display:none;">
      <span id="user-email"></span>
      <div style="display:flex; align-items:center; gap:14px;">
        <span class="sync-indicator" id="sync-indicator">
          <span class="sync-dot"></span>
          <span id="sync-text">已同步</span>
        </span>
        <button class="btn" data-action="sign-out" style="padding:4px 10px; font-size:11px;">登出</button>
      </div>
    </div>

    <!-- HEADER -->
    <header class="head">
      <div class="eyebrow">Calibration · 卷卷的</div>
      <div class="title">校 准</div>
      <div class="subtitle">给预测系统装一个置信度刻度</div>
    </header>

    <!-- TABS -->
    <nav class="tabs" id="tabs"></nav>

    <!-- VIEW -->
    <main id="view"></main>

    <!-- FOOTER -->
    <footer class="foot">手上动着，心里允许它悬着。</footer>
  </div>

  <!-- ========================================================
       SVG icons (lucide style, inlined)
       ======================================================== -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <symbol id="i-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></symbol>
      <symbol id="i-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></symbol>
      <symbol id="i-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14z"/></symbol>
      <symbol id="i-x" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></symbol>
      <symbol id="i-edit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></symbol>
      <symbol id="i-chev-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></symbol>
      <symbol id="i-chev-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></symbol>
      <symbol id="i-clock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></symbol>
      <symbol id="i-cal" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></symbol>
    </defs>
  </svg>

  <!-- ========================================================
       APP LOGIC
       一个简单的 state -> render 模式：
         1. state 是单一数据源
         2. 任何状态变化调 setState() / save()，触发 render()
         3. 事件用全局 click/submit 委托，data-action 属性 dispatch
         4. localStorage 做持久化
       ======================================================== -->
  <script type="module">
    "use strict";

    /* ========================================================
       SUPABASE 配置
       ⬇️ 在这里填你的 Supabase 项目参数（按 SETUP.md 拿到）
       如果不填，会进入"仅本地模式"，只用 localStorage、不同步
       ======================================================== */
    const SUPABASE_URL      = "https://bcxjwnwfhdqptqnjybds.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_RQ2z3iuNvhC6RXwJkxOzEQ_YIpLYzZM";

    /* ========================================================
       云端 + 本地的双层 storage
       ======================================================== */

    let supabase = null;
    let currentUser = null;
    let localOnlyMode = false;

    // sync state for indicator
    let syncStatus = "idle"; // idle | syncing | error | offline
    let saveTimer = null;

    function setSyncStatus(status, text) {
      syncStatus = status;
      const dot = document.querySelector("#sync-indicator .sync-dot");
      const txt = document.getElementById("sync-text");
      if (!dot || !txt) return;
      dot.className = "sync-dot " + (status === "idle" ? "" : status);
      txt.textContent = text || ({
        idle: "已同步",
        syncing: "同步中…",
        error: "同步失败",
        offline: "仅本地",
      })[status];
    }

    async function initSupabase() {
      if (SUPABASE_URL.includes("YOUR_") || SUPABASE_ANON_KEY.includes("YOUR_")) {
        return false; // 没配置
      }
      try {
        const mod = await import("https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm");
        supabase = mod.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
          auth: {
            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true,
          },
        });
        return true;
      } catch (e) {
        console.error("Supabase 加载失败", e);
        return false;
      }
    }

    async function loadFromCloud() {
      if (!supabase || !currentUser) return null;
      try {
        const { data, error } = await supabase
          .from("user_state")
          .select("data")
          .eq("user_id", currentUser.id)
          .maybeSingle();
        if (error) {
          console.error("cloud load failed", error);
          return null;
        }
        return data?.data || null;
      } catch (e) {
        console.error("cloud load exception", e);
        return null;
      }
    }

    async function saveToCloudNow(persisted) {
      if (!supabase || !currentUser) return;
      setSyncStatus("syncing");
      try {
        const { error } = await supabase
          .from("user_state")
          .upsert({
            user_id: currentUser.id,
            data: persisted,
            updated_at: new Date().toISOString(),
          });
        if (error) {
          console.error("cloud save failed", error);
          setSyncStatus("error");
        } else {
          setSyncStatus("idle");
        }
      } catch (e) {
        console.error("cloud save exception", e);
        setSyncStatus("error");
      }
    }

    function debouncedSaveToCloud(persisted) {
      if (saveTimer) clearTimeout(saveTimer);
      setSyncStatus("syncing");
      saveTimer = setTimeout(() => saveToCloudNow(persisted), 800);
    }

    /* ========================================================
       原 app 逻辑（utilities / state / render / events）
       ======================================================== */


    /* ------------ utilities ------------ */
    const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

    const escapeHTML = (s) =>
      String(s ?? "").replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      }[c]));

    const fmtTime = (ts) => {
      const d = new Date(ts);
      const m = d.getMonth() + 1, day = d.getDate();
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      return `${m}.${day}  ${hh}:${mm}`;
    };
    const dayOfWeek = (ts) => ["周日","周一","周二","周三","周四","周五","周六"][new Date(ts).getDay()];
    const hourOf = (ts) => new Date(ts).getHours();

    const icon = (name, size = 14) =>
      `<svg width="${size}" height="${size}" aria-hidden="true"><use href="#i-${name}"/></svg>`;

    /* ------------ tree helpers ------------ */
    const updateNode = (nodes, id, fn) => nodes.map(n =>
      n.id === id ? fn(n) :
      (n.children?.length ? { ...n, children: updateNode(n.children, id, fn) } : n));

    const addChildTo = (nodes, parentId, child) => nodes.map(n =>
      n.id === parentId ? { ...n, children: [...(n.children || []), child] } :
      (n.children?.length ? { ...n, children: addChildTo(n.children, parentId, child) } : n));

    const deleteNodeById = (nodes, id) => nodes
      .filter(n => n.id !== id)
      .map(n => ({ ...n, children: n.children ? deleteNodeById(n.children, id) : [] }));

    const countTree = (nodes) => {
      let total = 0, done = 0;
      const walk = (arr) => arr.forEach(n => {
        total++; if (n.done) done++;
        if (n.children?.length) walk(n.children);
      });
      walk(nodes);
      return { total, done };
    };

    /* ------------ persistence ------------ */
    const STORAGE_KEY = "calibration-data-v1";

    const defaultState = () => ({
      currentTab: "moment",
      moments: [],
      worry: {
        settings: { startTime: "19:00", durationMin: 20 },
        pending: [],
        processed: [],
      },
      plan: {
        tree: [],
        reviews: [],
      },
      // editing transient state (NOT persisted)
      ui: {
        momentDraft: "",
        parkDraft: "",
        activeWorryId: null,
        actionDraft: "",
        uncontrolDraft: "",
        reviewWeek: "",
        reviewText: "",
        editingNodeId: null,
        editDraft: { title: "", scheduleType: "", dateRange: "" },
      },
    });

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return defaultState();
        const saved = JSON.parse(raw);
        const s = defaultState();
        // shallow merge persisted slices
        if (saved.currentTab) s.currentTab = saved.currentTab;
        if (saved.moments) s.moments = saved.moments;
        if (saved.worry) s.worry = { ...s.worry, ...saved.worry };
        if (saved.plan) s.plan = { ...s.plan, ...saved.plan };
        return s;
      } catch (e) {
        console.warn("loadState failed, resetting", e);
        return defaultState();
      }
    }

    function saveState() {
      try {
        const { ui, ...persisted } = state;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(persisted));
        // 同步到云端（如果已登录且非本地模式）
        if (!localOnlyMode && supabase && currentUser) {
          debouncedSaveToCloud(persisted);
        }
      } catch (e) {
        console.error("saveState failed", e);
      }
    }

    /* ------------ state ------------ */
    let state = loadState();

    function setState(patch) {
      state = { ...state, ...patch };
      saveState();
      render();
    }
    function patchUI(patch) {
      state = { ...state, ui: { ...state.ui, ...patch } };
      render();
    }

    /* ========================================================
       RENDERERS
       ======================================================== */

    const TABS = [
      { id: "moment",  label: "此刻",     sub: "signal vs noise" },
      { id: "worry",   label: "焦虑时段", sub: "worry postponement" },
      { id: "plan",    label: "输入计划", sub: "controllables" },
      { id: "pattern", label: "模式",     sub: "patterns" },
    ];

    function renderTabs() {
      return TABS.map(t => `
        <button class="tab ${t.id === state.currentTab ? "active" : ""}" data-action="tab" data-tab="${t.id}">
          ${t.label}
          <small>${t.sub}</small>
        </button>
      `).join("");
    }

    /* ---------- TAB 1 · 此刻 ---------- */
    function renderMoment() {
      const { moments, ui } = state;
      const items = moments.map(m => `
        <div class="item ${m.type}">
          <div style="flex:1; min-width:0;">
            <div class="item-text">${escapeHTML(m.text)}</div>
            <div class="item-meta">
              <span class="tag tag-${m.type} small">${m.type === "signal" ? "信号" : "空转"}</span>
              <span>${dayOfWeek(m.createdAt)}</span>
              <span>·</span>
              <span>${fmtTime(m.createdAt)}</span>
            </div>
          </div>
          <button class="icon-btn" data-action="moment-delete" data-id="${m.id}" title="删除">${icon("x")}</button>
        </div>
      `).join("");

      return `
        <div class="card">
          <div class="h-serif lg">我现在握着具体信息吗？</div>
          <div class="help">
            写下此刻在脑子里转的那件事。然后判断——这是有数据支持的<em>信号</em>，
            还是没有新信息只是在<em>空转</em>。
          </div>
          <textarea id="moment-text" rows="3" placeholder="例：又开始想明年秋招大厂会不会要我">${escapeHTML(ui.momentDraft)}</textarea>
          <div class="row">
            <button class="btn btn-noise"  data-action="moment-add" data-type="noise">标记为空转</button>
            <button class="btn btn-signal" data-action="moment-add" data-type="signal">标记为信号</button>
          </div>
        </div>

        <div style="margin-top:32px;">
          <div class="section-label">近期 · ${moments.length} 条</div>
          ${moments.length === 0
            ? `<div class="empty">还没有记录。</div>`
            : `<div class="stack">${items}</div>`}
        </div>
      `;
    }

    /* ---------- TAB 2 · 焦虑时段 ---------- */
    function renderWorry() {
      const { worry, ui } = state;
      const { startTime, durationMin } = worry.settings;

      const pending = worry.pending.map(p => {
        const isActive = ui.activeWorryId === p.id;
        return `
          <div style="background:${isActive ? 'var(--surface-soft)' : 'var(--surface)'};
                      border:1px solid ${isActive ? 'var(--ink)' : 'var(--border-soft)'};
                      border-radius:3px; padding:12px 16px;">
            <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:12px;">
              <div style="flex:1; min-width:0;">
                <div class="item-text" style="margin-bottom:0;">${escapeHTML(p.text)}</div>
                <div style="margin-top:6px; font-size:11px; color:var(--ink-faint); letter-spacing:0.04em;">
                  暂存于 ${fmtTime(p.createdAt)}
                </div>
              </div>
              <div style="display:flex; gap:4px; flex-shrink:0;">
                ${isActive
                  ? `<button class="icon-btn" data-action="worry-close" title="收起">${icon("x")}</button>`
                  : `<button class="btn btn-soft" data-action="worry-open" data-id="${p.id}" style="padding:4px 10px; font-size:12px;">处理</button>`}
                <button class="icon-btn" data-action="worry-drop-pending" data-id="${p.id}" title="丢弃">${icon("trash", 13)}</button>
              </div>
            </div>
            ${isActive ? `
              <div style="margin-top:18px;">
                <div style="margin-bottom:14px;">
                  <div style="font-size:12px; letter-spacing:0.06em; color:var(--sage); margin-bottom:6px;">我能采取的具体行动</div>
                  <textarea id="action-text" rows="2" placeholder="明天就能做的一步">${escapeHTML(ui.actionDraft)}</textarea>
                </div>
                <div style="margin-bottom:14px;">
                  <div style="font-size:12px; letter-spacing:0.06em; color:var(--noise); margin-bottom:6px;">我不能控制的部分</div>
                  <textarea id="uncontrol-text" rows="2" placeholder="写下来，让它待在那儿">${escapeHTML(ui.uncontrolDraft)}</textarea>
                </div>
                <div style="display:flex; justify-content:flex-end;">
                  <button class="btn btn-ink" data-action="worry-finish">归档</button>
                </div>
              </div>
            ` : ""}
          </div>
        `;
      }).join("");

      const archive = worry.processed.slice(0, 30).map(p => `
        <details>
          <summary>
            <span style="font-size:13px; color:var(--ink); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${escapeHTML(p.text)}</span>
            <span style="font-size:11px; color:var(--ink-faint); white-space:nowrap;">${fmtTime(p.processedAt)}</span>
          </summary>
          <div class="summary-content stack sm">
            ${p.action ? `
              <div>
                <div style="font-size:11px; letter-spacing:0.06em; color:var(--sage); margin-bottom:4px;">行动</div>
                <div style="font-size:13px; line-height:1.7; white-space:pre-wrap; word-break:break-word;">${escapeHTML(p.action)}</div>
              </div>` : ""}
            ${p.uncontrollable ? `
              <div>
                <div style="font-size:11px; letter-spacing:0.06em; color:var(--noise); margin-bottom:4px;">放下</div>
                <div style="font-size:13px; line-height:1.7; white-space:pre-wrap; word-break:break-word;">${escapeHTML(p.uncontrollable)}</div>
              </div>` : ""}
            <div style="display:flex; justify-content:flex-end;">
              <button class="icon-btn" data-action="worry-drop-processed" data-id="${p.id}" title="删除">${icon("trash", 13)}</button>
            </div>
          </div>
        </details>
      `).join("");

      return `
        <div class="stack lg">
          <div class="strip">
            ${icon("clock")} <span>每天的焦虑时段</span>
            <input type="time" id="worry-start" value="${startTime}" data-action="worry-set-time" style="width:auto;" />
            <span>持续</span>
            <input type="number" id="worry-duration" value="${durationMin}" min="5" max="60" data-action="worry-set-duration" style="width:64px;" />
            <span>分钟</span>
          </div>

          <div class="card">
            <div class="h-serif md">时段外冒出来的焦虑——先记下来</div>
            <div class="help">告诉它："我看到你了，${startTime} 见。"</div>
            <textarea id="park-text" rows="2" placeholder="把它停在这里，不展开。">${escapeHTML(ui.parkDraft)}</textarea>
            <div class="row">
              <button class="btn btn-ink" data-action="worry-park">暂存</button>
            </div>
          </div>

          <div>
            <div class="section-label">暂存中 · ${worry.pending.length} 条 · 等到 ${startTime} 处理</div>
            ${worry.pending.length === 0
              ? `<div class="empty">暂存区是空的。</div>`
              : `<div class="stack sm">${pending}</div>`}
          </div>

          <div>
            <div class="section-label">已归档 · ${worry.processed.length} 条</div>
            ${worry.processed.length === 0
              ? `<div class="empty">归档是空的。</div>`
              : `<div class="stack sm">${archive}</div>`}
          </div>
        </div>
      `;
    }

    /* ---------- TAB 3 · 输入计划 (Tree) ---------- */
    function renderTreeNode(node, depth) {
      const { ui } = state;
      const editing = ui.editingNodeId === node.id;
      const hasChildren = node.children && node.children.length > 0;
      const expandKey = `expanded-${node.id}`;
      const expanded = window[expandKey] !== false; // default expanded

      const chevron = hasChildren
        ? `<button class="icon-btn" data-action="tree-toggle" data-id="${node.id}" title="展开/收起">
             ${icon(expanded ? "chev-down" : "chev-right")}
           </button>`
        : `<span style="width:26px; display:inline-block;"></span>`;

      const checkbox = `
        <button class="checkbox ${node.done ? "done" : ""}" data-action="tree-toggle-done" data-id="${node.id}" title="${node.done ? "已完成" : "未完成"}">
          ${node.done ? icon("check", 12) : ""}
        </button>
      `;

      let titleArea;
      if (editing) {
        const draft = ui.editDraft;
        titleArea = `
          <div class="edit-form">
            <input type="text" id="edit-title" value="${escapeHTML(draft.title)}" placeholder="标题" autofocus />
            <div class="edit-controls">
              <select id="edit-type">
                <option value=""        ${draft.scheduleType === ""        ? "selected" : ""}>不指定</option>
                <option value="weekly"  ${draft.scheduleType === "weekly"  ? "selected" : ""}>周计划</option>
                <option value="dated"   ${draft.scheduleType === "dated"   ? "selected" : ""}>日期范围</option>
              </select>
              ${draft.scheduleType === "dated" ? `
                <input type="text" id="edit-range" value="${escapeHTML(draft.dateRange)}" placeholder="如 5.6-5.8" style="width:140px; font-size:12px; padding:5px 10px;" />
              ` : ""}
              <button class="btn btn-ink"   data-action="tree-save"   data-id="${node.id}" style="padding:5px 12px; font-size:12px;">保存</button>
              <button class="btn"           data-action="tree-cancel" style="padding:5px 8px; font-size:12px;">取消</button>
            </div>
          </div>
        `;
      } else {
        const tags = [];
        if (node.scheduleType === "weekly") tags.push(`<span class="tag tag-rose small">周计划</span>`);
        if (node.scheduleType === "dated" && node.dateRange) tags.push(`<span class="tag tag-signal small">${escapeHTML(node.dateRange)}</span>`);
        titleArea = `
          <div style="flex:1; min-width:0;">
            <div class="node-title ${depth === 0 ? "depth-0" : "deep"} ${node.done ? "done" : ""}"
                 data-action="tree-edit" data-id="${node.id}">
              ${escapeHTML(node.title)}
            </div>
            ${tags.length ? `<div class="node-tags">${tags.join("")}</div>` : ""}
          </div>
        `;
      }

      const actions = editing ? "" : `
        <div class="node-actions">
          <button class="icon-btn" data-action="tree-edit" data-id="${node.id}" title="编辑">${icon("edit", 13)}</button>
          <button class="icon-btn" data-action="tree-add-child" data-id="${node.id}" title="添加子项">${icon("plus")}</button>
          <button class="icon-btn" data-action="tree-delete" data-id="${node.id}" data-title="${escapeHTML(node.title)}" title="删除">${icon("trash", 13)}</button>
        </div>
      `;

      const childrenHTML = (expanded && hasChildren)
        ? `<div class="tree-children">${node.children.map(c => renderTreeNode(c, depth + 1)).join("")}</div>`
        : "";

      return `
        <div class="tree-node" style="margin-left:${depth === 0 ? 0 : 0}px;">
          <div class="tree-row ${depth === 0 ? "depth-0" : "depth-deep"}">
            ${chevron}
            ${checkbox}
            ${titleArea}
            ${actions}
          </div>
          ${childrenHTML}
        </div>
      `;
    }

    function renderPlan() {
      const { plan, ui } = state;
      const stats = countTree(plan.tree);

      const tree = plan.tree.length === 0
        ? `<div class="empty">还没有计划。点上方"添加母项"开始。</div>`
        : `<div style="display:flex; flex-direction:column; gap:14px;">${plan.tree.map(r => renderTreeNode(r, 0)).join("")}</div>`;

      const reviews = plan.reviews.map(r => `
        <div class="item rose">
          <div style="flex:1; min-width:0;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
              <div class="h-serif" style="font-size:15px;">${escapeHTML(r.weekLabel)}</div>
              <div style="display:flex; align-items:center; gap:8px;">
                <span style="font-size:11px; color:var(--ink-faint);">${fmtTime(r.createdAt)}</span>
                <button class="icon-btn" data-action="review-delete" data-id="${r.id}" title="删除">${icon("trash", 13)}</button>
              </div>
            </div>
            <div style="font-size:14px; line-height:1.8; white-space:pre-wrap; word-break:break-word;">${escapeHTML(r.feeling)}</div>
          </div>
        </div>
      `).join("");

      return `
        <div class="stack lg">
          <div class="strip" style="justify-content:space-between;">
            <div>只评估左边——<span style="color:var(--ink);">输入</span>，不评估结果。</div>
            <div style="display:flex; align-items:center; gap:14px;">
              <span style="color:var(--ink-faint);">完成 ${stats.done} / ${stats.total}</span>
              <button class="btn btn-ink" data-action="tree-add-root">${icon("plus")} 添加母项</button>
            </div>
          </div>

          <div>${tree}</div>

          <div>
            <div class="section-label">每周复盘感受</div>
            <div class="card" style="padding:22px;">
              <div style="display:flex; gap:10px; margin-bottom:12px; align-items:center;">
                ${icon("cal")}
                <input type="text" id="review-week" placeholder="例：5.6 - 5.12" value="${escapeHTML(ui.reviewWeek)}" style="max-width:240px;" />
              </div>
              <textarea id="review-text" rows="3" placeholder="这周感觉怎么样？写感受，不写KPI。">${escapeHTML(ui.reviewText)}</textarea>
              <div class="row">
                <button class="btn btn-ink" data-action="review-add">记下来</button>
              </div>
            </div>
            ${plan.reviews.length > 0 ? `<div class="stack" style="margin-top:18px;">${reviews}</div>` : ""}
          </div>
        </div>
      `;
    }

    /* ---------- TAB 4 · 模式 ---------- */
    function renderPattern() {
      const { moments } = state;
      if (moments.length === 0) {
        return `
          <div class="card">
            <div class="h-serif" style="font-size:18px; margin-bottom:8px;">这里会长出你的模式。</div>
            <div style="font-size:14px; color:var(--ink-soft); line-height:1.8;">
              先去"此刻"标记几条信号 / 空转，三五天之后回来看。<br/>
              你会看到哪些时段你最容易空转——周日晚上？月初？看完同学动态之后？
              看到这个 pattern，你就能在那些时段提前安排"非预测性"的事情来打断它。
            </div>
          </div>
        `;
      }

      const total = moments.length;
      const signalCount = moments.filter(m => m.type === "signal").length;
      const noiseCount = total - signalCount;

      const hourBuckets = Array.from({length:24}, () => ({ signal: 0, noise: 0 }));
      moments.forEach(m => {
        const h = hourOf(m.createdAt);
        hourBuckets[h][m.type] += 1;
      });
      const dowBuckets = Array.from({length:7}, () => ({ signal: 0, noise: 0 }));
      moments.forEach(m => {
        const dow = new Date(m.createdAt).getDay();
        dowBuckets[dow][m.type] += 1;
      });

      const maxHour = Math.max(1, ...hourBuckets.map(b => b.signal + b.noise));
      const maxDow  = Math.max(1, ...dowBuckets.map(b => b.signal + b.noise));

      const hourBars = hourBuckets.map((b, i) => {
        const t = b.signal + b.noise;
        const h = t === 0 ? 0 : (t / maxHour) * 120;
        const sigH = t === 0 ? 0 : (b.signal / t) * h;
        const noiseH = h - sigH;
        return `
          <div class="chart-hour-bar" title="${i}时 — 信号 ${b.signal} / 空转 ${b.noise}">
            <div class="seg-noise" style="height:${noiseH}px;"></div>
            <div class="seg-signal" style="height:${sigH}px;"></div>
          </div>
        `;
      }).join("");

      const dowLabels = ["周日","周一","周二","周三","周四","周五","周六"];
      const dowBars = dowBuckets.map((b, i) => {
        const t = b.signal + b.noise;
        const h = t === 0 ? 0 : (t / maxDow) * 120;
        const sigH = t === 0 ? 0 : (b.signal / t) * h;
        const noiseH = h - sigH;
        return `
          <div class="chart-dow-col">
            <div class="chart-dow-bar">
              <div class="seg-noise" style="height:${noiseH}px;"></div>
              <div class="seg-signal" style="height:${sigH}px;"></div>
            </div>
            <div class="dow-label">${dowLabels[i]}</div>
            <div class="dow-count">${t}</div>
          </div>
        `;
      }).join("");

      return `
        <div class="stack lg">
          <div class="stats-grid">
            <div class="stat-card ink"><div class="stat-label">总记录</div><div class="stat-value ink">${total}</div></div>
            <div class="stat-card signal"><div class="stat-label">信号</div><div class="stat-value signal">${signalCount}</div></div>
            <div class="stat-card noise"><div class="stat-label">空转</div><div class="stat-value noise">${noiseCount}</div></div>
          </div>

          <div class="card">
            <div class="section-label">分布 · 一天中的时段</div>
            <div class="chart-hour">${hourBars}</div>
            <div class="chart-hour-axis">
              <span>0时</span><span>6时</span><span>12时</span><span>18时</span><span>23时</span>
            </div>
          </div>

          <div class="card">
            <div class="section-label">分布 · 一周中的天</div>
            <div class="chart-dow">${dowBars}</div>
          </div>

          <div class="pattern-note">
            看图不是为了焦虑数字。是为了看到——你的预测系统更容易在什么时候开始空转。
            看到了，下一次那个时段来临之前，你就有机会安排别的事情把它岔开。
          </div>
        </div>
      `;
    }

    /* ---------- main render ---------- */
    function render() {
      document.getElementById("tabs").innerHTML = renderTabs();
      const view = document.getElementById("view");
      switch (state.currentTab) {
        case "moment":  view.innerHTML = renderMoment();  break;
        case "worry":   view.innerHTML = renderWorry();   break;
        case "plan":    view.innerHTML = renderPlan();    break;
        case "pattern": view.innerHTML = renderPattern(); break;
      }
      // restore focus on edit input if applicable
      if (state.ui.editingNodeId) {
        const el = document.getElementById("edit-title");
        if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
      }
    }

    /* ========================================================
       EVENT HANDLERS
       全局点击委托 + 输入实时同步到 ui state
       ======================================================== */

    // Sync transient drafts from textareas/inputs back into ui state
    // (so re-render doesn't wipe out what user is typing)
    document.addEventListener("input", (e) => {
      const t = e.target;
      if (!t || !t.id) return;
      switch (t.id) {
        case "moment-text":    state.ui.momentDraft = t.value; break;
        case "park-text":      state.ui.parkDraft = t.value; break;
        case "action-text":    state.ui.actionDraft = t.value; break;
        case "uncontrol-text": state.ui.uncontrolDraft = t.value; break;
        case "review-week":    state.ui.reviewWeek = t.value; break;
        case "review-text":    state.ui.reviewText = t.value; break;
        case "edit-title":     state.ui.editDraft.title = t.value; break;
        case "edit-range":     state.ui.editDraft.dateRange = t.value; break;
      }
    });

    // 'change' for select / number-or-time inputs that need re-render
    document.addEventListener("change", (e) => {
      const t = e.target;
      if (!t || !t.id) return;
      if (t.id === "edit-type") {
        state.ui.editDraft.scheduleType = t.value;
        render();
      } else if (t.id === "worry-start") {
        state.worry.settings.startTime = t.value;
        saveState();
        render();
      } else if (t.id === "worry-duration") {
        const v = parseInt(t.value) || 20;
        state.worry.settings.durationMin = v;
        saveState();
      }
    });

    // Click delegation
    document.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-action]");
      if (!btn) return;
      const action = btn.dataset.action;
      const id = btn.dataset.id;

      switch (action) {
        case "tab":
          setState({ currentTab: btn.dataset.tab });
          break;

        /* moment */
        case "moment-add": {
          const text = state.ui.momentDraft.trim();
          if (!text) return;
          const m = { id: uid(), text, type: btn.dataset.type, createdAt: Date.now() };
          state.moments = [m, ...state.moments];
          state.ui.momentDraft = "";
          saveState(); render();
          break;
        }
        case "moment-delete":
          state.moments = state.moments.filter(m => m.id !== id);
          saveState(); render();
          break;

        /* worry */
        case "worry-park": {
          const text = state.ui.parkDraft.trim();
          if (!text) return;
          state.worry.pending = [{ id: uid(), text, createdAt: Date.now() }, ...state.worry.pending];
          state.ui.parkDraft = "";
          saveState(); render();
          break;
        }
        case "worry-open":
          state.ui.activeWorryId = id;
          state.ui.actionDraft = "";
          state.ui.uncontrolDraft = "";
          render();
          break;
        case "worry-close":
          state.ui.activeWorryId = null;
          render();
          break;
        case "worry-finish": {
          const item = state.worry.pending.find(p => p.id === state.ui.activeWorryId);
          if (!item) return;
          const processed = {
            ...item,
            action: state.ui.actionDraft.trim(),
            uncontrollable: state.ui.uncontrolDraft.trim(),
            processedAt: Date.now(),
          };
          state.worry.pending = state.worry.pending.filter(p => p.id !== item.id);
          state.worry.processed = [processed, ...state.worry.processed];
          state.ui.activeWorryId = null;
          state.ui.actionDraft = "";
          state.ui.uncontrolDraft = "";
          saveState(); render();
          break;
        }
        case "worry-drop-pending":
          state.worry.pending = state.worry.pending.filter(p => p.id !== id);
          if (state.ui.activeWorryId === id) state.ui.activeWorryId = null;
          saveState(); render();
          break;
        case "worry-drop-processed":
          state.worry.processed = state.worry.processed.filter(p => p.id !== id);
          saveState(); render();
          break;

        /* tree */
        case "tree-add-root":
          state.plan.tree = [...state.plan.tree, {
            id: uid(), title: "新母项", scheduleType: null, dateRange: "", done: false, children: [],
          }];
          saveState(); render();
          break;
        case "tree-toggle-done":
          state.plan.tree = updateNode(state.plan.tree, id, n => ({ ...n, done: !n.done }));
          saveState(); render();
          break;
        case "tree-toggle":
          window[`expanded-${id}`] = window[`expanded-${id}`] === false ? true : false;
          render();
          break;
        case "tree-add-child":
          state.plan.tree = addChildTo(state.plan.tree, id, {
            id: uid(), title: "新子项", scheduleType: null, dateRange: "", done: false, children: [],
          });
          window[`expanded-${id}`] = true;
          saveState(); render();
          break;
        case "tree-delete": {
          const title = btn.dataset.title;
          if (window.confirm(`删除 "${title}" ?`)) {
            state.plan.tree = deleteNodeById(state.plan.tree, id);
            saveState(); render();
          }
          break;
        }
        case "tree-edit": {
          // find node to seed draft
          const findNode = (arr) => {
            for (const n of arr) {
              if (n.id === id) return n;
              if (n.children?.length) {
                const f = findNode(n.children);
                if (f) return f;
              }
            }
            return null;
          };
          const n = findNode(state.plan.tree);
          if (!n) return;
          state.ui.editingNodeId = id;
          state.ui.editDraft = {
            title: n.title,
            scheduleType: n.scheduleType || "",
            dateRange: n.dateRange || "",
          };
          render();
          break;
        }
        case "tree-cancel":
          state.ui.editingNodeId = null;
          render();
          break;
        case "tree-save": {
          const draft = state.ui.editDraft;
          state.plan.tree = updateNode(state.plan.tree, id, n => ({
            ...n,
            title: (draft.title || "").trim() || n.title,
            scheduleType: draft.scheduleType || null,
            dateRange: draft.scheduleType === "dated" ? (draft.dateRange || "") : "",
          }));
          state.ui.editingNodeId = null;
          saveState(); render();
          break;
        }

        /* review */
        case "review-add": {
          const week = state.ui.reviewWeek.trim();
          const feeling = state.ui.reviewText.trim();
          if (!week && !feeling) return;
          state.plan.reviews = [{
            id: uid(),
            weekLabel: week || "本周",
            feeling,
            createdAt: Date.now(),
          }, ...state.plan.reviews];
          state.ui.reviewWeek = "";
          state.ui.reviewText = "";
          saveState(); render();
          break;
        }
        case "review-delete":
          state.plan.reviews = state.plan.reviews.filter(r => r.id !== id);
          saveState(); render();
          break;
      }
    });

    /* ---------- keyboard shortcuts ---------- */
    document.addEventListener("keydown", (e) => {
      // Esc to cancel tree edit
      if (e.key === "Escape" && state.ui.editingNodeId) {
        state.ui.editingNodeId = null;
        render();
      }
    });

    /* ========================================================
       AUTH UI HELPERS
       ======================================================== */

    function showAuthMessage(text, type = "info") {
      const el = document.getElementById("auth-message");
      if (!el) return;
      el.className = "auth-msg " + type;
      el.textContent = text;
    }

    function showAuthOverlay() {
      document.getElementById("auth-overlay").style.display = "flex";
      document.getElementById("main-page").style.display = "none";
      document.getElementById("config-warning").style.display = "none";
    }

    function showConfigWarning() {
      document.getElementById("auth-overlay").style.display = "none";
      document.getElementById("main-page").style.display = "none";
      document.getElementById("config-warning").style.display = "block";
    }

    function showMainPage() {
      document.getElementById("auth-overlay").style.display = "none";
      document.getElementById("config-warning").style.display = "none";
      document.getElementById("main-page").style.display = "block";

      // 显示用户条
      if (currentUser && !localOnlyMode) {
        const strip = document.getElementById("user-strip");
        strip.style.display = "flex";
        document.getElementById("user-email").textContent = currentUser.email;
        setSyncStatus("idle");
      } else if (localOnlyMode) {
        const strip = document.getElementById("user-strip");
        strip.style.display = "flex";
        document.getElementById("user-email").textContent = "本地模式";
        setSyncStatus("offline");
      }
    }

    // 仅本地模式（用户主动选择）
    window.enableLocalMode = function() {
      localOnlyMode = true;
      showMainPage();
      render();
    };

    /* ========================================================
       AUTH 表单事件
       ======================================================== */
    document.getElementById("auth-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("auth-email").value.trim();
      if (!email || !supabase) return;

      const btn = document.getElementById("auth-submit");
      btn.disabled = true;
      btn.textContent = "发送中…";
      showAuthMessage("", "info");

      try {
        const { error } = await supabase.auth.signInWithOtp({
          email,
          options: { emailRedirectTo: window.location.href.split("#")[0] },
        });
        if (error) {
          showAuthMessage("出错了：" + error.message, "error");
        } else {
          showAuthMessage(
            `已发送到 ${email}。请到邮箱里点击登录链接，会自动跳回这里。`,
            "success"
          );
        }
      } catch (e) {
        showAuthMessage("网络出错：" + e.message, "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "发送登录链接";
      }
    });

    // 登出按钮
    document.addEventListener("click", async (e) => {
      const btn = e.target.closest("[data-action='sign-out']");
      if (!btn) return;
      if (supabase) await supabase.auth.signOut();
      currentUser = null;
      // 清掉本地缓存（避免残留数据混到下个登录账号）
      localStorage.removeItem(STORAGE_KEY);
      location.reload();
    });

    /* ========================================================
       启动流程
       ======================================================== */
    let signedInHandled = false;

    async function handleSignIn(user) {
      // 防止 onAuthStateChange + getSession 重复调用
      if (signedInHandled && currentUser?.id === user.id) return;
      signedInHandled = true;
      currentUser = user;
      await onSignedIn();
    }

    async function start() {
      // 1. 尝试初始化 Supabase
      const ok = await initSupabase();
      if (!ok) {
        showConfigWarning();
        return;
      }

      // 2. 监听 auth 状态变化
      // ⚠️ Supabase SDK 限制：callback 里不能 await 任何 supabase 方法（会死锁）
      // 用 setTimeout 把后续逻辑推到下一个事件循环，跳出 SDK 内部的执行栈
      supabase.auth.onAuthStateChange((event, session) => {
        if (event === "SIGNED_IN" && session?.user) {
          setTimeout(() => handleSignIn(session.user), 0);
        } else if (event === "SIGNED_OUT") {
          currentUser = null;
          signedInHandled = false;
          showAuthOverlay();
        }
      });

      // 3. 检查当前是否已登录
      const { data: { session } } = await supabase.auth.getSession();
      if (session?.user) {
        await handleSignIn(session.user);
      } else {
        showAuthOverlay();
      }
    }

    async function onSignedIn() {
      showMainPage();
      // 从云端拉数据
      setSyncStatus("syncing", "拉取数据中…");
      const cloudData = await loadFromCloud();

      if (cloudData) {
        // 云端有数据 → 用云端数据覆盖
        const s = defaultState();
        if (cloudData.currentTab) s.currentTab = cloudData.currentTab;
        if (cloudData.moments) s.moments = cloudData.moments;
        if (cloudData.worry) s.worry = { ...s.worry, ...cloudData.worry };
        if (cloudData.plan) s.plan = { ...s.plan, ...cloudData.plan };
        state = s;
        // 同步本地缓存
        localStorage.setItem(STORAGE_KEY, JSON.stringify(cloudData));
        setSyncStatus("idle");
      } else {
        // 云端为空 → 检查本地是否有数据，如果有就上传
        const localRaw = localStorage.getItem(STORAGE_KEY);
        if (localRaw) {
          try {
            const parsed = JSON.parse(localRaw);
            await saveToCloudNow(parsed);
            // state 已经从 loadState() 拿到本地数据
          } catch (e) {
            setSyncStatus("error");
          }
        } else {
          setSyncStatus("idle");
        }
      }

      render();
    }

    /* ---------- 启动 ---------- */
    start();
  </script>
</body>
</html>
